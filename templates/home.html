{% extends "base.html" %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
  <section class="rounded-3xl border border-stone-700/10 bg-white/85 p-10 shadow-panel backdrop-blur sm:p-12">
    <p class="text-xs font-semibold uppercase tracking-[0.28em] text-ember-500">Starter Home</p>
    <h1 class="mt-4 text-4xl leading-none text-ink-900 sm:text-6xl">{{ heading }}</h1>
    <p class="mt-6 max-w-2xl text-lg leading-8 text-stone-700">{{ intro }}</p>
    {% if is_authenticated %}
      <p class="mt-8 inline-flex items-center rounded-full bg-emerald-100 px-5 py-3 text-sm font-semibold text-emerald-900">
        You are signed in.
      </p>
    {% else %}
      <a
        class="mt-8 inline-flex items-center rounded-full bg-ink-900 px-6 py-3 text-sm font-semibold text-parchment-50 transition hover:bg-stone-800"
        href="/register"
      >
        Create an account
      </a>
    {% endif %}
  </section>
{% endblock %}
