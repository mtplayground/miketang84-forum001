{% extends "base.html" %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
  <section class="rounded-3xl border border-stone-700/10 bg-white/85 p-10 shadow-panel backdrop-blur sm:p-12">
    <a class="text-sm font-semibold uppercase tracking-[0.24em] text-ember-600 underline decoration-ember-300 underline-offset-4" href="/c/{{ category_slug }}">
      Back to {{ category_name }}
    </a>
    <h1 class="mt-4 text-4xl leading-none text-ink-900 sm:text-5xl">{{ title }}</h1>

    <article class="prose prose-stone mt-10 max-w-none">
      {{ opening_post_html|safe }}
    </article>

    <div class="mt-10 rounded-3xl border border-dashed border-stone-300 bg-stone-50/80 px-6 py-10 text-center text-stone-600">
      Full thread replies and pagination land in the next forum task.
    </div>
  </section>
{% endblock %}
