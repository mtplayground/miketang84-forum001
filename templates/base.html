<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ page_title }}{% endblock %} - miketang84-forum001</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Georgia", "Times New Roman", serif;
        background: #f6f1e8;
        color: #241a12;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at top, rgba(190, 147, 94, 0.24), transparent 32rem),
          linear-gradient(180deg, #fbf7f0 0%, #f3ebdf 100%);
      }

      .shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header,
      footer {
        padding: 1.25rem 1.5rem;
        background: rgba(36, 26, 18, 0.92);
        color: #f8f1e7;
      }

      header {
        border-bottom: 1px solid rgba(248, 241, 231, 0.16);
      }

      main {
        width: min(52rem, calc(100% - 3rem));
        margin: 0 auto;
        padding: 4rem 0 5rem;
        flex: 1;
      }

      .card {
        background: rgba(255, 252, 247, 0.9);
        border: 1px solid rgba(89, 63, 39, 0.16);
        border-radius: 1.25rem;
        box-shadow: 0 1rem 3rem rgba(71, 43, 20, 0.08);
        padding: 2.5rem;
      }

      h1 {
        margin-top: 0;
        font-size: clamp(2.25rem, 4vw, 3.5rem);
        line-height: 1.05;
      }

      p {
        font-size: 1.05rem;
        line-height: 1.7;
      }

      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-size: 0.78rem;
        color: #8c5d2d;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <strong>miketang84-forum001</strong>
      </header>
      <main>
        {% block content %}{% endblock %}
      </main>
      <footer>
        Forum bootstrap powered by Axum, SQLx, and Askama.
      </footer>
    </div>
  </body>
</html>
